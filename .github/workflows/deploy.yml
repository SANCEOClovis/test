name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement'
        required: true
        type: choice
        options:
          - dev1
          - dev2
          - recette

jobs:
  ci:
    uses: ./.github/workflows/validation.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest

          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy DEV1
        if: inputs.environment == 'dev1'
        run: curl -X POST "${{ secrets.RENDER_DEV1_HOOK }}"

      - name: Deploy DEV2
        if: inputs.environment == 'dev2'
        run: curl -X POST "${{ secrets.RENDER_DEV2_HOOK }}"

      - name: Deploy RECETTE
        if: inputs.environment == 'recette'
        run: curl -X POST "${{ secrets.RENDER_RECETTE_HOOK }}"
