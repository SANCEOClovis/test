name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement'
        required: true
        type: choice
        options:
          - dev1
          - dev2
          - recette

jobs:
  ci:
    uses: ./.github/workflows/validation.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy DEV1
        if: inputs.environment == 'dev1'
        run: curl -X POST "${{ secrets.RENDER_DEV1_HOOK }}"

      - name: Deploy DEV2
        if: inputs.environment == 'dev2'
        run: curl -X POST "${{ secrets.RENDER_DEV2_HOOK }}"

      - name: Deploy RECETTE
        if: inputs.environment == 'recette'
        run: curl -X POST "${{ secrets.RENDER_RECETTE_HOOK }}"
