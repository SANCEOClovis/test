name: Cleanup GHCR

on:
  workflow_dispatch:
  schedule:
    - cron: '30 13 * * *' # tous les jours à 15h25

jobs:
  cleanup:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Delete old images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          package: frontend-angular
          token: ${{ secrets.GITHUB_TOKEN }}
          keep-n-tagged: 5
          delete-untagged: true
