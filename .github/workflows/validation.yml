name: Code Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install NPM dependencies
        run: npm ci
      - name: Run lint check
        run: npm run lint
      - name: Build project
        run: npm run build
